<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tháp Dinh Dưỡng cho người từ 15-19 tuổi</title>
    <style>
        body {
            margin: 0;
            overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at center, #2c3e50 0%, #1a252f 100%);
            color: #ecf0f1;
            touch-action: none; 
        }

        #ui-layer {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; 
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 12px;
            box-sizing: border-box;
            z-index: 10;
        }

        h1 {
            text-align: center;
            font-size: 1.2rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 0 4px 10px rgba(0,0,0,0.5);
            pointer-events: auto;
            margin-top: 5px;
            margin-bottom: 8px;
        }

        .hint {
            background: rgba(255, 255, 255, 0.1);
            padding: 5px 15px;
            border-radius: 20px;
            backdrop-filter: blur(5px);
            font-size: 0.8rem;
            pointer-events: auto;
            border: 1px solid rgba(255,255,255,0.2);
            margin-bottom: 5px;
            animation: pulse 2s infinite;
            text-align: center;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(255, 255, 255, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 255, 255, 0); }
        }
        
        .details-box {
            pointer-events: auto; 
            background: rgba(30, 41, 59, 0.85);
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            max-width: 400px;
            width: 100%;
            margin-top: auto;
            margin-bottom: 5px;
            border-top: 5px solid #3498db;
            backdrop-filter: blur(10px);
            transition: border-color 0.3s;
            max-height: 250px; 
            overflow-y: auto;
            touch-action: pan-y; 
        }

        .details-box::-webkit-scrollbar { width: 5px; }
        .details-box::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.3); border-radius: 10px; }

        #detail-title {
            color: #3498db;
            margin-top: 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 6px;
            font-size: 1.1rem;
            margin-bottom: 10px;
            transition: color 0.3s;
        }

        /* --- CSS MỚI CHO THÔNG ĐIỆP VÀ CALO --- */
        .detail-meta {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
            display: none; /* Ẩn mặc định */
        }

        .detail-message {
            font-style: italic;
            color: #f1c40f;
            font-size: 0.9rem;
            border-left: 3px solid #f1c40f;
            padding-left: 10px;
            line-height: 1.4;
        }

        .detail-calo {
            align-self: flex-start;
            background: rgba(231, 76, 60, 0.2);
            color: #ff7675;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: bold;
            border: 1px solid rgba(231, 76, 60, 0.5);
        }
        /* -------------------------------------- */

        .detail-img {
            width: 100%;
            height: auto;
            max-height: 90px;
            object-fit: cover;
            border-radius: 8px;
            margin-bottom: 10px;
            display: none; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        #detail-content {
            line-height: 1.5;
            font-size: 0.9rem;
            color: #cbd5e1;
        }

        #detail-content b { color: #fff; }
        .highlight { color: #e74c3c; font-weight: bold; }

        @media (min-width: 768px) {
            #ui-layer {
                flex-direction: row;
                align-items: flex-start;
                justify-content: space-between;
                padding: 40px;
            }
            h1 { text-align: left; max-width: 400px; font-size: 1.6rem; margin-bottom: 20px; }
            .details-box { 
                margin-top: 0; 
                margin-bottom: 0; 
                padding: 25px;
                max-height: 80vh; 
            }
            .detail-img { max-height: 180px; } 
            #detail-title { font-size: 1.3rem; margin-bottom: 15px; padding-bottom: 10px; }
            #detail-content { font-size: 1rem; line-height: 1.7; }
            .hint { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); font-size: 0.9rem; padding: 8px 20px; }
        }
    </style>
</head>
<body>

    <div id="ui-layer">
        <div>
            <h1>THÁP DINH DƯỠNG 3D<br>(15-19 TUỔI)</h1>
            <div class="hint">Made by Tổ 1 with huge ❤️❤️</div>
        </div>

        <div class="details-box" id="info-box">
            <h2 id="detail-title">Trạng thái chờ...</h2>
            
            <div id="detail-meta" class="detail-meta">
                <div id="detail-message" class="detail-message"></div>
                <div id="detail-calo" class="detail-calo"></div>
            </div>

            <img src="" alt="Dinh dưỡng" id="detail-img" class="detail-img">
            <div id="detail-content">
                Hãy tương tác trực tiếp bằng cách vuốt để xoay hoặc chạm vào các khối màu 3D để xem lượng dinh dưỡng khuyến nghị. Nhấn ra ngoài không gian để hủy chọn.
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // ĐÃ BỔ SUNG: Calo ước tính và Thông điệp truyền thông cho từng tầng
        const data = {
            1: { 
                title: "Tầng 1 (Đỉnh): Đường, muối", 
                imgSrc: "./tang7.png", 
                calo: "Dưới 100 kcal",
                message: "Hạn chế tối đa - Ngọt ngào hay mặn mà đều cần chừng mực!",
                content: `<b>Khẩu phần Đường:</b> < 5 đơn vị ăn<br><b>Khẩu phần Muối:</b> < 5g<br><b>1 đơn vị ăn =</b><ul style="margin-top: 5px; padding-left: 20px;"><li>Đường 5g</li><li>Mật ong 6g</li><li>Bơ 6g</li></ul><b>5g =</b><ul style="margin-top: 5px; padding-left: 20px;"><li>muối 5 g</li><li>bột canh 8g</li><li>nước mắm 25 ml</li></ul>` 
            },
            2: { 
                title: "Tầng 2: Dầu, mỡ", 
                imgSrc: "./tang6.png", 
                calo: "Khoảng 225 - 270 kcal",
                message: "Tiêu thụ ít - Chọn chất béo tốt để bảo vệ sức khỏe tim mạch.",
                content: `<b>Khẩu phần:</b> 5-6 đơn vị ăn<br><b>1 đơn vị ăn =</b><ul style="margin-top: 5px; padding-left: 20px;"><li>Dầu ăn 5 ml</li><li>Mỡ lợn 5g</li><li>Bơ 6g</li></ul>` 
            },
            3: { 
                title: "Tầng 3: Sữa và sản phẩm chế biến", 
                imgSrc: "./tang5.png", 
                calo: "Khoảng 350 - 400 kcal",
                message: "Sử dụng vừa phải - Đủ Canxi mỗi ngày, xương chắc dáng cao.",
                content: `<b>Khẩu phần:</b> 6 đơn vị ăn<br>1 đơn vị ăn=100mg calcium<br><b>1 đơn vị ăn =</b><ul style="margin-top: 5px; padding-left: 20px;"><li>Sữa dạng lỏng 100 ml</li><li>Sữa chua 100g</li><li>Phô mai 15g</li></ul>` 
            },
            4: { 
                title: "Tầng 4: Thịt, Thủy sản, Trứng", 
                imgSrc: "./tang4.png", 
                calo: "Khoảng 250 - 400 kcal",
                message: "Ăn đủ - Đa dạng nguồn đạm để nạp năng lượng bứt phá.",
                content: `<b>Khẩu phần:</b> <span class='highlight'>6-8 đơn vị ăn</span><br>1 đơn vị ăn = 7g protein<br><b>1 đơn vị ăn =</b><ul style="margin-top: 5px; padding-left: 20px;"><li>Thịt lợn nạc 38g</li><li>Thịt gà cả xương 71g</li><li>Trứng gà 55g</li><li>Cá bỏ xương 44g</li><li>Tôm biển sống 87g</li><li>Đậu phụ 65g</li></ul>` 
            },
            5: { 
                title: "Tầng 5: Rau và quả", 
                imgSrc: "./tang3.png", 
                calo: "Khoảng 200 - 250 kcal",
                message: "Ăn nhiều - Sắc màu rau củ quả là vitamin cho sự tươi trẻ.",
                content: `<b>Rau:</b> 3-4 đơn vị/ngày<br><b>Quả:</b> 3 đơn vị ăn<br>1 đơn vị ăn = 80g<br><b> 1 đơn vị ăn rau = </b><ul style="margin-top: 5px; padding-left: 20px;"><li>Rau lá đã nấu chín (1/2 bát con)</li><li>Rau củ đã nấu chín (1/2 bát con)</li><li>Bí xanh luộc (10 miếng)</li><li>Cà chua (1/2 quả to)</li></ul><b> 1 đơn vị ăn quả = </b><ul style="margin-top: 5px; padding-left: 20px;"><li>Táo tây (1 quả nhỏ)</li><li>Chuối tây (2 quả nhỏ)</li><li>Bưởi (1 múi to)</li><li>Hồng xiêm (1 quả nhỏ)</li><li>Nho ngọt (8 quả)</li><li>Dứa (1/4 quả trung bình)</li></ul>` 
            },
            6: { 
                title: "Tầng 6: Ngũ cốc, khoai củ", 
                imgSrc: "./tang2.png", 
                calo: "Khoảng 1300 - 1500 kcal",
                message: "Ăn đủ - Nền tảng năng lượng chính cho ngày dài học tập.",
                content: `Tiêu thụ khuyến nghị trong một ngày là khoảng <b>14-17 đơn vị ăn</b> (1 đơn vị ăn = 20g glucid)<ul style="margin-top: 5px; padding-left: 20px;"><li>Cơm tẻ 55g (1/2 lưng bát con)</li><li>Bánh phở 60g (1/2 bát con)</li><li>Bún tươi 80g (1/2 bát con)</li><li>Miến đã nấu chín 71g (1/2 bát con)</li><li>Bánh mì 30g (1/2 cái trung bình)</li><li>Ngô nếp luộc 122g (1 bắp nhỏ)</li><li>Khoai sọ 90g (1 củ trung bình)</li><li>Khoai lang 84g (1 củ nhỏ)</li><li>Khoai tây 109g (1 củ nhỏ)</li></ul>` 
            },
            7: { 
                title: "Tầng 7 (Đáy): Nước", 
                imgSrc: "./tang1.jpg", 
                calo: "0 kcal",
                message: "Uống đủ - Nước là sự sống, kết hợp vận động để khỏe mạnh.",
                content: "<b>Nước uống:</b> 8-12 đơn vị hay <span class='highlight'>1600 - 2400 ml/ngày.</span> (1 đơn vị = 200ml)<br><b>Thể dục:</b> Tập và hoạt động thể lực khoảng 60 phút/ngày" 
            }
        };

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 40); 

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
        scene.add(ambientLight);
        const directionalLight = new THREE.DirectionalLight(0xffffff, 0.8);
        directionalLight.position.set(20, 30, 20);
        scene.add(directionalLight);

        const pyramidGroup = new THREE.Group();
        scene.add(pyramidGroup);

        const hexColors = ['#e74c3c', '#d35400', '#e67e22', '#f1c40f', '#3498db', '#2ecc71', '#27ae60'];
        const layerHeight = 1.8;
        const meshes = []; 
        const textureLoader = new THREE.TextureLoader();

        // Biến lưu ID của tầng đang được chọn
        let selectedLayerId = null;

        for(let i = 0; i < 7; i++) {
            const radiusTop = i * 1.6;
            const radiusBottom = (i + 1) * 1.6;
            let geometry = new THREE.CylinderGeometry(radiusTop, radiusBottom, layerHeight, 4);
            geometry = geometry.toNonIndexed();
            geometry.computeVertexNormals();
            geometry.userData.originalUVs = Array.from(geometry.attributes.uv.array);
            
            const material = new THREE.MeshStandardMaterial({ 
                color: hexColors[i], 
                roughness: 0.4, 
                metalness: 0.1,
                transparent: true,
                opacity: 1.0 
            });
            const mesh = new THREE.Mesh(geometry, material);
            
            const originalY = (6 - i) * layerHeight - (layerHeight * 3);
            mesh.position.y = originalY;
            mesh.rotation.y = Math.PI / 4; 
            
            mesh.userData = { 
                layerId: i + 1,
                originalY: originalY 
            };
            
            const edges = new THREE.EdgesGeometry(geometry);
            const lineMaterial = new THREE.LineBasicMaterial({ color: 0x8b4513, linewidth: 2, transparent: true, opacity: 0.8 });
            const line = new THREE.LineSegments(edges, lineMaterial);
            mesh.add(line);

            pyramidGroup.add(mesh);
            meshes.push(mesh);

            textureLoader.load(data[i + 1].imgSrc, function(texture) {
                const imgAspect = texture.image.width / texture.image.height;
                const faceWidth = ((radiusTop + radiusBottom) / 2) * Math.sqrt(2); 
                const faceHeight = Math.hypot(layerHeight, radiusBottom - radiusTop);
                const faceAspect = faceWidth / faceHeight;

                let scaleU = 1, scaleV = 1;
                if (imgAspect > faceAspect) scaleU = faceAspect / imgAspect;
                else scaleV = imgAspect / faceAspect;

                const uvAttribute = geometry.attributes.uv;
                const originalUVs = geometry.userData.originalUVs;

                for (let j = 0; j < uvAttribute.count; j += 3) {
                    const ny = geometry.attributes.normal.getY(j);
                    if (Math.abs(ny) < 0.99) { 
                        let u0 = originalUVs[j * 2];
                        let minU = Math.min(u0, originalUVs[(j + 1) * 2], originalUVs[(j + 2) * 2]);
                        let faceIndex = Math.floor(minU * 4 + 0.01);
                        
                        for (let k = 0; k < 3; k++) {
                            let idx = j + k;
                            let u = originalUVs[idx * 2];
                            let v = originalUVs[idx * 2 + 1];
                            let localU = (u - faceIndex * 0.25) * 4;
                            uvAttribute.setXY(idx, 0.5 + (localU - 0.5) * scaleU, 0.5 + (v - 0.5) * scaleV);
                        }
                    }
                }
                uvAttribute.needsUpdate = true;
                material.map = texture;
                material.color.setHex(0xffffff);
                material.needsUpdate = true;
            });
        }

        function adjustLayoutForScreen() {
            const width = window.innerWidth;
            const height = window.innerHeight;
            if (width < 768) {
                pyramidGroup.scale.set(0.7, 0.7, 0.7); 
                pyramidGroup.position.y = (height / width > 1.8) ? 8 : 8; 
            } else {
                pyramidGroup.scale.set(1, 1, 1); 
                pyramidGroup.position.y = 6; 
            }
        }
        adjustLayoutForScreen();

        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        let isDragging = false;
        let previousMousePosition = { x: 0, y: 0 };
        let dragStartPosition = { x: 0, y: 0 };
        let isAutoRotating = true; 
        let idleTimer;
        let rotationVelocity = 0;

        function isPointingUI(e) {
            if (!e || !e.target) return false;
            const infoBox = document.getElementById('info-box');
            if (infoBox && infoBox.contains(e.target)) return true;
            if (e.target.tagName === 'H1') return true;
            if (e.target.classList && e.target.classList.contains('hint')) return true;
            return false;
        }

        function handlePointerDown(e) {
            if (isPointingUI(e)) return; 

            isDragging = true;
            isAutoRotating = false;
            rotationVelocity = 0; 
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            previousMousePosition = { x: clientX, y: clientY };
            dragStartPosition = { x: clientX, y: clientY };
            clearTimeout(idleTimer);
        }

        function handlePointerMove(e) {
            if (!isDragging) return;
            
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            
            const deltaX = clientX - previousMousePosition.x;
            
            if (Math.abs(deltaX) > 0) {
                rotationVelocity = deltaX * 0.005;
            }
            
            pyramidGroup.rotation.y += deltaX * 0.005;
            previousMousePosition = { x: clientX, y: clientY };
        }

        function handlePointerUp(e) {
            if (!isDragging) return;
            isDragging = false;
            
            const clientX = e.changedTouches ? e.changedTouches[0].clientX : e.clientX;
            const clientY = e.changedTouches ? e.changedTouches[0].clientY : e.clientY;

            const dist = Math.hypot(clientX - dragStartPosition.x, clientY - dragStartPosition.y);
            if (dist < 10) {
                checkIntersection(clientX, clientY);
            }

            idleTimer = setTimeout(() => { isAutoRotating = true; }, 4000);
        }

        function checkIntersection(clientX, clientY) {
            mouse.x = (clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(clientY / window.innerHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const intersects = raycaster.intersectObjects(pyramidGroup.children, true);

            if(intersects.length > 0) {
                let clickedObject = intersects[0].object;
                
                if (clickedObject.type === 'LineSegments') {
                    clickedObject = clickedObject.parent;
                }

                if (clickedObject && clickedObject.userData && clickedObject.userData.layerId) {
                    const id = clickedObject.userData.layerId;
                    selectedLayerId = id; 

                    const detailBox = document.getElementById('info-box');
                    const title = document.getElementById('detail-title');
                    const content = document.getElementById('detail-content');
                    const img = document.getElementById('detail-img');
                    
                    // Lấy các element mới
                    const metaBox = document.getElementById('detail-meta');
                    const messageEl = document.getElementById('detail-message');
                    const caloEl = document.getElementById('detail-calo');

                    if (data[id]) {
                        title.innerText = data[id].title;
                        content.innerHTML = data[id].content;
                        
                        // Cập nhật Calo và Message
                        messageEl.innerText = `💡 "${data[id].message}"`;
                        caloEl.innerText = `🔥 Năng lượng: ${data[id].calo}`;
                        metaBox.style.display = 'flex'; // Hiển thị khung chứa

                        img.src = data[id].imgSrc;
                        img.style.display = 'block'; 
                        detailBox.style.borderTopColor = hexColors[id - 1];
                        title.style.color = hexColors[id - 1];
                        messageEl.style.color = hexColors[id - 1]; // Đổi màu thông điệp theo màu tầng cho tone-sur-tone
                        
                        if (detailBox.scrollTo) {
                            detailBox.scrollTo({ top: 0, behavior: 'smooth' });
                        } else {
                            detailBox.scrollTop = 0;
                        }
                    }
                }
            } else {
                selectedLayerId = null;
                resetUI();
            }
        }

        function resetUI() {
            const detailBox = document.getElementById('info-box');
            const title = document.getElementById('detail-title');
            const content = document.getElementById('detail-content');
            const img = document.getElementById('detail-img');
            const metaBox = document.getElementById('detail-meta');

            title.innerText = "Trạng thái chờ...";
            title.style.color = "#3498db";
            content.innerHTML = "Hãy tương tác trực tiếp bằng cách vuốt để xoay hoặc chạm vào các khối màu 3D để xem lượng dinh dưỡng khuyến nghị. Nhấn ra ngoài không gian để hủy chọn.";
            
            // Ẩn các thuộc tính chi tiết
            img.style.display = 'none';
            metaBox.style.display = 'none';
            
            detailBox.style.borderTopColor = "#3498db";
        }

        window.addEventListener('mousedown', handlePointerDown);
        window.addEventListener('mousemove', handlePointerMove);
        window.addEventListener('mouseup', handlePointerUp);

        window.addEventListener('touchstart', handlePointerDown, {passive: false});
        window.addEventListener('touchmove', handlePointerMove, {passive: false});
        window.addEventListener('touchend', handlePointerUp);

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            adjustLayoutForScreen(); 
        });

        function animate() {
            requestAnimationFrame(animate);

            if (!isDragging) {
                if (Math.abs(rotationVelocity) > 0.0001) {
                    pyramidGroup.rotation.y += rotationVelocity;
                    rotationVelocity *= 0.92; 
                    isAutoRotating = false; 
                } else if (isAutoRotating) {
                    pyramidGroup.rotation.y += 0.005; 
                }
            }

            meshes.forEach(mesh => {
                if (!mesh.userData || !mesh.userData.layerId) return;

                const id = mesh.userData.layerId;
                const isSelected = selectedLayerId === id;
                const isAnySelected = selectedLayerId !== null;

                let targetOpacity = 1.0;
                if (isAnySelected && !isSelected) {
                    targetOpacity = 0.25; 
                }

                let targetY = mesh.userData.originalY || 0;
                if (isSelected) {
                    targetY += 0.4; 
                }

                if (mesh.material && mesh.material.opacity !== undefined) {
                    mesh.material.opacity += (targetOpacity - mesh.material.opacity) * 0.1;
                }
                
                const line = mesh.children.find(child => child.type === 'LineSegments');
                if (line && line.material && line.material.opacity !== undefined) {
                    line.material.opacity = mesh.material.opacity;
                }

                mesh.position.y += (targetY - mesh.position.y) * 0.15;
            });

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
